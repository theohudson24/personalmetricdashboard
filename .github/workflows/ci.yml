name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=require
      SUPABASE_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/postgres?sslmode=require
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: test-publishable-key
      TEST_USER_EMAILS: tester@example.com
      ADMIN_EMAILS: admin@example.com
      FDC_API_KEY: DEMO_KEY
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Run lint
        run: npm run lint
      - name: Build application
        run: npm run build
